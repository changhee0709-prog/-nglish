<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>딩동댕 피아노 친구</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body, html {
            font-family: 'Jua', sans-serif; margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #FFF0F5; overflow: hidden; touch-action: none; user-select: none;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #FFB6C1, #87CEFA);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        #start-screen h1 { font-size: 3rem; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: center; }
        #start-btn {
            font-family: 'Jua', sans-serif; font-size: 2rem; padding: 15px 40px; background: #FF69B4; color: white;
            border: none; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; animation: bounceBtn 1s infinite alternate;
        }
        @keyframes bounceBtn { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        #app-container { display: none; flex-direction: column; height: 100%; width: 100%; }

        header {
            background-color: #FFB6C1; padding: 10px 5px; display: flex; flex-direction: column;
            align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 50;
        }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; }
        select, button { font-family: 'Jua', sans-serif; font-size: 1rem; padding: 8px 12px; border-radius: 20px; border: 2px solid #fff; outline: none; cursor: pointer; }
        #mic-btn { background: #fff; color: #333; border-color: #333; font-weight: bold; }
        #mic-btn.active { background: #4CAF50; color: white; border-color: #4CAF50; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        #mic-status {
            display: none; background: #E8F5E9; color: #2E7D32; padding: 5px 15px; border-radius: 15px; font-size: 1rem; border: 2px solid #4CAF50; text-align: center;
        }
        #volume-bar { display: inline-block; width: 100px; background: #ccc; height: 12px; border-radius: 6px; margin: 0 5px; overflow: hidden; vertical-align: middle; }
        #volume-fill { height: 100%; width: 0%; background: #4CAF50; transition: width 0.05s; }
        #error-log { color: #D32F2F; font-size: 0.9rem; margin-top: 5px; display: none; line-height: 1.3; }

        #sheet-music-container {
            flex: 1; position: relative; background: #fffdf5; overflow: hidden; min-height: 120px;
        }
        #center-guideline {
            position: absolute; left: 50%; top: 0; height: 100%; width: 6px;
            background: rgba(255, 105, 180, 0.3); transform: translateX(-50%); z-index: 1; border-radius: 5px;
        }
        #staff-lines-bg {
            position: absolute; width: 100%; height: 50px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        #staff-lines-bg .line { height: 2px; background-color: #ccc; width: 100%; }
        #notes-track {
            position: absolute; display: flex; align-items: flex-end;
            height: 50px; top: 50%; transform: translateY(-50%); z-index: 2; 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); left: 0;
        }
        .note-box { position: relative; width: 60px; height: 100%; opacity: 0.3; transition: all 0.3s; }
        .note-box.active { opacity: 1; transform: scale(1.4); z-index: 10; }
        .note-box.played { opacity: 0; transform: scale(0.5); }
        .note-head { position: absolute; left: 0; display: flex; align-items: center; }
        .note-circle { width: 16px; height: 12px; background-color: #000; border-radius: 50%; transform: rotate(-15deg); position: relative; }
        .active .note-circle { background-color: #FF69B4; box-shadow: 0 0 10px #FF69B4; }
        .note-stem { position: absolute; width: 2px; height: 30px; background-color: #000; bottom: 5px; right: 0px; }
        .active .note-stem { background-color: #FF69B4; }
        .note-name-label { margin-left: 8px; font-size: 1rem; background: #FF69B4; color: white; padding: 2px 6px; border-radius: 10px; border: 2px solid #fff; font-weight: bold; }
        .ledger-line { position: absolute; width: 26px; height: 2px; background-color: #333; top: 5px; left: -5px; }

        #piano-container { height: 45%; display: flex; justify-content: center; position: relative; background-color: #333; padding-top: 5px; }
        .key { position: relative; cursor: pointer; border-radius: 0 0 8px 8px; box-sizing: border-box; }
        .key.white { background: linear-gradient(to bottom, #fff 0%, #eee 100%); flex: 1; max-width: 65px; height: 100%; border: 1px solid #ccc; z-index: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; font-size: 1.2rem; color: #777; font-weight: bold; }
        .key.white:active, .key.white.pressed { background: #e0e0e0; border-top: 5px solid #FF69B4; }
        .key.black { background: linear-gradient(to bottom, #333 0%, #000 100%); width: 8%; max-width: 40px; height: 60%; margin-left: -4%; margin-right: -4%; z-index: 2; border-radius: 0 0 5px 5px; }
        .key.black:active, .key.black.pressed { background: #222; }

        #virtual-hand { position: absolute; pointer-events: none; z-index: 10; opacity: 0.9; font-size: 4.5rem; transition: left 0.3s ease-out, top 0.3s ease-out; animation: pressHand 0.6s infinite alternate; display: none; margin-top: -25px; margin-left: -15px; }
        @keyframes pressHand { 0% { transform: translateY(0); } 100% { transform: translateY(20px); } }
        
        #success-message { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 3rem; color: #FF69B4; text-shadow: 2px 2px 5px rgba(0,0,0,0.1); text-align: center; }
        #success-message button { margin-top: 30px; font-size: 1.5rem; padding: 15px 30px; background: #FF69B4; color: white; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🎹 딩동댕<br>피아노 친구</h1>
        <button id="start-btn" onclick="startApp()">시작하기</button>
    </div>

    <div id="app-container">
        <header>
            <div class="controls">
                <select id="song-select" onchange="loadSong()">
                    <option value="butterfly">나비야</option>
                    <option value="airplane">비행기</option>
                    <option value="rabbit">산토끼</option>
                    <option value="bears">곰 세마리</option>
                    <option value="star">반짝반짝 작은별</option>
                </select>
                <select id="mic-devices" style="display:none; max-width: 150px;"></select>
                <button id="mic-btn" onclick="toggleMicrophone()">🎤 피아노 연결(마이크)</button>
            </div>
            
            <div id="mic-status">
                <div>음량: <div id="volume-bar"><div id="volume-fill"></div></div> 
                들리는음: <strong id="detected-note-name" style="color: #D32F2F; font-size: 1.2rem;">-</strong></div>
                <div id="error-log"></div>
            </div>
        </header>

        <div id="sheet-music-container">
            <div id="center-guideline"></div>
            <div id="staff-lines-bg">
                <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
            </div>
            <div id="notes-track"></div>
        </div>

        <div id="piano-container">
            <div id="virtual-hand">👆</div>
        </div>
    </div>

    <div id="success-message">
        🎉 완주를 축하해요! 🎉
        <button onclick="restartSong()">다시하기</button>
    </div>

    <script>
        function startApp() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            
            initAudio();
            if(document.getElementById('piano-container').children.length <= 1) {
                createPiano(); loadSong();
            }
        }

        const notesData =[
            { id: 'C4', type: 'white', name: '도', freq: 261.63, midi: 60 }, { id: 'Cs4', type: 'black', name: '', freq: 277.18, midi: 61 },
            { id: 'D4', type: 'white', name: '레', freq: 293.66, midi: 62 }, { id: 'Ds4', type: 'black', name: '', freq: 311.13, midi: 63 },
            { id: 'E4', type: 'white', name: '미', freq: 329.63, midi: 64 }, { id: 'F4', type: 'white', name: '파', freq: 349.23, midi: 65 },
            { id: 'Fs4', type: 'black', name: '', freq: 369.99, midi: 66 }, { id: 'G4', type: 'white', name: '솔', freq: 392.00, midi: 67 },
            { id: 'Gs4', type: 'black', name: '', freq: 415.30, midi: 68 }, { id: 'A4', type: 'white', name: '라', freq: 440.00, midi: 69 },
            { id: 'As4', type: 'black', name: '', freq: 466.16, midi: 70 }, { id: 'B4', type: 'white', name: '시', freq: 493.88, midi: 71 },
            { id: 'C5', type: 'white', name: '도', freq: 523.25, midi: 72 }
        ];
        const noteNamesArray =['도', '도#', '레', '레#', '미', '파', '파#', '솔', '솔#', '라', '라#', '시'];
        const songs = {
            butterfly:['G4','E4','E4','F4','D4','D4','C4','D4','E4','F4','G4','G4','G4','G4','E4','E4','F4','D4','D4','C4','E4','G4','G4','E4','E4','E4'],
            airplane:['E4','D4','C4','D4','E4','E4','E4','D4','D4','D4','E4','G4','G4','E4','D4','C4','D4','E4','E4','E4','D4','D4','E4','D4','C4'],
            rabbit:['G4','E4','E4','G4','E4','C4','C4','E4','G4','C5','G4','E4','C4','D4','F4','F4','A4','G4','F4','E4','C4','E4','G4','E4','D4','C4'],
            bears:['C4','C4','C4','C4','C4','E4','G4','G4','E4','C4','G4','G4','E4','C4','C4','C4','E4','G4','G4','G4','G4','G4','E4','C4'],
            star:['C4','C4','G4','G4','A4','A4','G4','F4','F4','E4','E4','D4','D4','C4','G4','G4','F4','F4','E4','E4','D4','G4','G4','F4','F4','E4','E4','D4','C4','C4','G4','G4','A4','A4','G4','F4','F4','E4','E4','D4','D4','C4']
        };
        const notePositions = { 'C4': -12, 'D4': -6, 'E4': 0, 'F4': 6, 'G4': 12, 'A4': 18, 'B4': 24, 'C5': 30 };

        let currentSong =[]; let currentNoteIndex = 0; let audioCtx;
        let analyser; let isMicActive = false; let pitchMatchCount = 0; let stream;
        
        // 연타 방지(쿨타임)용 변수 추가
        let pitchCooldown = false; 

        const pianoContainer = document.getElementById('piano-container');
        const notesTrack = document.getElementById('notes-track');
        const virtualHand = document.getElementById('virtual-hand');
        const successMessage = document.getElementById('success-message');
        const volFill = document.getElementById('volume-fill');
        const noteNameDisplay = document.getElementById('detected-note-name');
        const errorLog = document.getElementById('error-log');
        const micDevicesSelect = document.getElementById('mic-devices');

        function createPiano() {
            notesData.forEach(note => {
                const key = document.createElement('div');
                key.className = `key ${note.type}`; key.dataset.note = note.id;
                if(note.type === 'white') key.innerText = note.name;
                key.addEventListener('mousedown', () => playKey(note.id));
                key.addEventListener('touchstart', (e) => { e.preventDefault(); playKey(note.id); });
                pianoContainer.appendChild(key);
            });
            pianoContainer.appendChild(virtualHand);
        }

        function loadSong() {
            currentSong = songs[document.getElementById('song-select').value];
            currentNoteIndex = 0; successMessage.style.display = 'none'; virtualHand.style.display = 'block';
            pitchCooldown = false; // 곡 시작 시 쿨타임 초기화
            notesTrack.innerHTML = '';
            currentSong.forEach((noteId, index) => {
                const noteInfo = notesData.find(n => n.id === noteId);
                const bottomOffset = notePositions[noteId] - 6;
                const noteBox = document.createElement('div');
                noteBox.className = 'note-box'; noteBox.id = `note-${index}`;
                noteBox.innerHTML = `
                    <div class="note-head" style="bottom: ${bottomOffset}px;">
                        ${noteId === 'C4' ? '<div class="ledger-line"></div>' : ''}
                        <div class="note-circle"><div class="note-stem"></div></div>
                        <div class="note-name-label">${noteInfo.name}</div>
                    </div>`;
                notesTrack.appendChild(noteBox);
            });
            updateUI();
        }

        function restartSong() { loadSong(); }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(frequency) {
            initAudio();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = frequency;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);
            osc.stop(audioCtx.currentTime + 1.0);
        }

        function playKey(noteId, isFromMic = false) {
            const keyEl = document.querySelector(`.key[data-note="${noteId}"]`);
            if(keyEl) { keyEl.classList.add('pressed'); setTimeout(() => keyEl.classList.remove('pressed'), 200); }
            if(!isFromMic) playSound(notesData.find(n => n.id === noteId).freq);

            if (currentNoteIndex < currentSong.length && noteId === currentSong[currentNoteIndex]) {
                document.getElementById(`note-${currentNoteIndex}`).classList.remove('active');
                document.getElementById(`note-${currentNoteIndex}`).classList.add('played');
                currentNoteIndex++;
                if (currentNoteIndex < currentSong.length) { updateUI(); } 
                else {
                    virtualHand.style.display = 'none';
                    setTimeout(() => {
                        successMessage.style.display = 'flex';
                        if(!isFromMic) { playSound(523.25); setTimeout(() => playSound(659.25), 200); setTimeout(() => playSound(783.99), 400); }
                    }, 500);
                }
            }
        }

        function updateUI() {
            if (currentNoteIndex >= currentSong.length) return;
            document.getElementById(`note-${currentNoteIndex}`).classList.add('active');
            
            const containerWidth = document.getElementById('sheet-music-container').clientWidth;
            const boxWidth = 60; 
            const offset = (containerWidth / 2) - (boxWidth / 2) - (currentNoteIndex * boxWidth);
            notesTrack.style.transform = `translateX(${offset}px)`;

            const targetKeyEl = document.querySelector(`.key[data-note="${currentSong[currentNoteIndex]}"]`);
            if (targetKeyEl) {
                const keyRect = targetKeyEl.getBoundingClientRect();
                const containerRect = pianoContainer.getBoundingClientRect();
                const leftPos = keyRect.left - containerRect.left + (keyRect.width / 2) - 30; 
                virtualHand.style.left = `${leftPos}px`;
                virtualHand.style.top = targetKeyEl.classList.contains('black') ? '0%' : '15%';
            }
        }

        async function toggleMicrophone() {
            initAudio();
            errorLog.style.display = "none"; errorLog.innerText = "";

            if (window.location.protocol === 'file:') {
                alert("🚨[치명적 오류] 핸드폰에 다운받은 파일을 직접 열었기 때문에 애플/구글 보안 정책상 마이크가 영구 차단됩니다!\n\n해결법: 카카오톡 등에서 안내해드린 tiiny.host 사이트를 이용해 진짜 인터넷 주소(https)로 접속하셔야만 해결됩니다.");
                showError("핸드폰 파일 직접 실행은 마이크가 차단됩니다. (https:// 주소 필요)");
                return;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError("현재 환경에서는 마이크를 쓸 수 없습니다. 사파리나 크롬 브라우저를 이용해 주세요.");
                return;
            }

            try {
                const audioConstraints = { echoCancellation: false, autoGainControl: false, noiseSuppression: false };
                if (micDevicesSelect.value) audioConstraints.deviceId = { exact: micDevicesSelect.value };
                if (stream) stream.getTracks().forEach(track => track.stop()); 

                stream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 4096;
                const microphone = audioCtx.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                isMicActive = true;
                document.getElementById('mic-btn').innerText = "🎤 마이크 켜짐!";
                document.getElementById('mic-btn').classList.add('active');
                document.getElementById('mic-status').style.display = "block";
                
                getMicrophones(); detectPitch(); 
            } catch (err) {
                isMicActive = false;
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showError("마이크 권한이 차단되었습니다! 브라우저 설정에서 마이크를 허용해주세요.");
                } else { showError(`마이크 연결 오류: ${err.message}`); }
            }
        }

        function showError(msg) {
            errorLog.style.display = "block"; errorLog.innerText = msg;
            document.getElementById('mic-status').style.display = "block";
        }

        async function getMicrophones() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(device => device.kind === 'audioinput');
                if (audioInputs.length > 1) {
                    micDevicesSelect.style.display = "inline-block";
                    micDevicesSelect.innerHTML = "";
                    audioInputs.forEach(device => {
                        const option = document.createElement('option');
                        option.value = device.deviceId; option.text = device.label || `마이크 ${micDevicesSelect.length + 1}`;
                        micDevicesSelect.appendChild(option);
                    });
                    micDevicesSelect.onchange = toggleMicrophone; 
                }
            } catch (e) { }
        }

        function noteFromPitch(frequency) { let noteNum = 12 * (Math.log(frequency / 440) / Math.log(2)); return Math.round(noteNum) + 69; }

        function autoCorrelate(buffer, sampleRate) {
            let SIZE = buffer.length; let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
            rms = Math.sqrt(rms / SIZE);
            
            let volPercent = Math.min(100, rms * 3000); volFill.style.width = volPercent + "%";
            if (rms < 0.005) return -1; 

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buffer[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buffer = buffer.slice(r1, r2); SIZE = buffer.length; let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) for (let j = 0; j < SIZE - i; j++) c[i] += buffer[j] * buffer[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
            return sampleRate / maxpos;
        }

        function detectPitch() {
            if (!isMicActive) return; 
            requestAnimationFrame(detectPitch);
            
            if (currentNoteIndex >= currentSong.length) return;

            // 💡 쿨타임(연타 방지) 중이면 소리 분석을 잠시 멈춥니다!
            if (pitchCooldown) return;

            const buffer = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(buffer);
            const frequency = autoCorrelate(buffer, audioCtx.sampleRate);
            
            if (frequency !== -1) {
                const detectedMidi = noteFromPitch(frequency);
                const noteNameIndex = detectedMidi % 12; 
                noteNameDisplay.innerText = noteNamesArray[noteNameIndex];

                const targetNoteId = currentSong[currentNoteIndex];
                const targetMidi = notesData.find(n => n.id === targetNoteId).midi;

                if (detectedMidi % 12 === targetMidi % 12) {
                    pitchMatchCount++;
                    if (pitchMatchCount >= 3) { 
                        playKey(targetNoteId, true); 
                        pitchMatchCount = 0; 
                        
                        // 💡 정답을 맞추면 쿨타임을 발동시킵니다.
                        pitchCooldown = true;
                        
                        // 💡 0.45초(450ms) 뒤에 다시 마이크 귀를 엽니다. (아이들 속도에 적당한 시간)
                        setTimeout(() => {
                            pitchCooldown = false;
                        }, 450); 
                    }
                } else { pitchMatchCount = 0; }
            } else { noteNameDisplay.innerText = "-"; pitchMatchCount = 0; }
        }

        window.addEventListener('resize', () => { if(currentNoteIndex < currentSong.length) updateUI(); });
    </script>
</body>
</html>
